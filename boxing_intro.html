<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boxing Bogor - Intro Animation</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0a0a0a;
            font-family: 'Oswald', sans-serif;
            overflow: hidden;
            color: #fff;
        }
        .boxing-intro-container {
            text-align: center;
            position: relative;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .boxer-icon {
            font-size: 8rem;
            color: #ff1e1e;
            opacity: 0;
            position: absolute;
            left: -150px;
            transform: scale(0.5);
            animation: boxer-punch 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 3s;
            text-shadow: 0 0 20px rgba(255, 30, 30, 0.6);
        }
        @keyframes boxer-punch {
            0% { opacity: 0; left: -150px; transform: scale(0.5) rotate(-30deg); }
            70% { opacity: 1; left: 10px; transform: scale(1.1) rotate(5deg); }
            100% { opacity: 1; left: 0; transform: scale(1) rotate(0deg); }
        }
        .boxing-text {
            font-size: 5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            border-right: 5px solid #ff1e1e;
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
            animation: typing 3s steps(30, end) forwards, 
                       blink-caret 0.75s step-end infinite, 
                       text-punch 0.5s ease forwards;
            animation-delay: 0s, 0s, 3s;
        }
        .boxing-text span { color: #ff1e1e; }
        @keyframes typing { from { width: 0; } to { width: 100%; } }
        @keyframes blink-caret { from, to { border-color: transparent; } 50% { border-color: #ff1e1e; } }
        @keyframes text-punch {
            0% { transform: translateX(0); opacity: 1; border-right: 5px solid #ff1e1e; }
            100% { transform: translateX(20px); opacity: 0.9; border-right: none; text-shadow: 0 0 10px rgba(255, 30, 30, 0.4); }
        }
        @media (max-width: 768px) {
            .boxing-text { font-size: 2rem; letter-spacing: 2px; }
            .boxer-icon { font-size: 4rem; left: -60px; }
        }
    </style>
</head>
<body>
    <div class="boxing-intro-container">
        <i class="fas fa-fist-raised boxer-icon"></i>
        <h1 class="boxing-text"><span>P</span>ersatuan Boxing Bogor</h1>
    </div>
</body>
</html>
